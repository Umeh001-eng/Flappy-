<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flappy Bird</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#000;
}

#gameContainer{
  width:100%;
  max-width:420px;
  height:700px;
  position:relative;
  overflow:hidden;
  border-radius:18px;
}

canvas{width:100%;height:100%;display:block}

#overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.6);
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:10;
}

button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#ffd166;
  font-weight:bold;
  cursor:pointer;
}

#scoreBoard{
  position:absolute;
  top:15px;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:40px;
  font-weight:bold;
  text-shadow:2px 2px 4px #000;
}

#soundBtn{
  position:absolute;
  top:10px;
  left:10px;
  z-index:20;
  padding:8px 10px;
}
</style>
</head>

<body>

<div id="gameContainer">

<button id="soundBtn">🔊 Sound</button>

<canvas id="gameCanvas"></canvas>

<div id="overlay">
  <h1>Flappy Bird</h1>
  <p>Tap / Space to Fly</p>
  <button id="startBtn">Start</button>
</div>

<div id="scoreBoard">0</div>
</div>

<script>

// ===== IMAGES =====
const birdImg = new Image();
birdImg.src = "https://i.postimg.cc/bw22N8Jw/IMG-3826.png";

const bgImg = new Image();
bgImg.src = "https://i.postimg.cc/QdpxyMCy/IMG-3828.png";

// ===== CANVAS =====
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 420;
canvas.height = 700;

const W = canvas.width;
const H = canvas.height;

// ===== UI =====
const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");
const scoreBoard = document.getElementById("scoreBoard");
const soundBtn = document.getElementById("soundBtn");

// ===== AUDIO =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let soundOn = true;

function sound(f,d){
  if(!soundOn) return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=f;
  g.gain.value=0.1;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime+d);
}

// ===== GAME =====
let bird, pipes, frame, score, gravity, playing;
let bgX = 0;

// ===== RESET =====
function reset(){
  bird = {x:90,y:H/2,vy:0,r:14}; // REAL radius hitbox
  pipes=[];
  frame=0;
  score=0;
  gravity=0.32;
  scoreBoard.innerText=0;
}

// ===== START =====
function start(){
  overlay.style.display="none";
  reset();
  playing=true;
  audioCtx.resume();
  loop();
}

// ===== END =====
function end(){
  playing=false;
  overlay.style.display="flex";
  overlay.innerHTML=`
    <h1>Game Over</h1>
    <p>Score: ${score}</p>
    <button onclick="start()">Restart</button>
  `;
  sound(120,0.3);
}

// ===== FLAP =====
function flap(){
  if(!playing) return;
  bird.vy = -5.6;
  sound(600,0.08);
}

// ===== PIPE =====
function addPipe(){
  const gap = 150;
  const top = 60 + Math.random()*(H/2.3);

  pipes.push({
    x:W,
    w:60,
    top,
    bottom:top+gap,
    passed:false
  });
}

// ===== PIPE DRAW =====
function drawPipe(p){
  ctx.fillStyle="#2ecc71";
  ctx.fillRect(p.x,0,p.w,p.top);
  ctx.fillRect(p.x,p.bottom,p.w,H);

  ctx.fillStyle="#27ae60";
  ctx.fillRect(p.x-5,p.top-18,p.w+10,18);
  ctx.fillRect(p.x-5,p.bottom,p.w+10,18);
}

// ===== LOOP =====
function loop(){
  if(!playing) return;
  requestAnimationFrame(loop);

  bgX -= 1;
  if(bgX <= -W) bgX = 0;

  ctx.drawImage(bgImg,bgX,0,W,H);
  ctx.drawImage(bgImg,bgX+W,0,W,H);

  frame++;

  if(frame%95===0) addPipe();

  // physics
  bird.vy += gravity;
  bird.y += bird.vy;

  // bird draw (centered circle hitbox)
  ctx.drawImage(birdImg,bird.x-bird.r*2,bird.y-bird.r*2,bird.r*4,bird.r*4);

  for(let i=pipes.length-1;i>=0;i--){
    let p=pipes[i];
    p.x -= 2.6;

    drawPipe(p);

    // SCORE
    if(!p.passed && p.x < bird.x){
      score++;
      p.passed=true;
      scoreBoard.innerText=score;
      sound(500,0.1);
    }

    // ===== REAL FAIR COLLISION =====
    const closestX = Math.max(p.x, Math.min(bird.x, p.x + p.w));

    const hitTop =
      bird.y - bird.r < p.top;

    const hitBottom =
      bird.y + bird.r > p.bottom;

    const insideX =
      closestX === bird.x || (bird.x > p.x && bird.x < p.x + p.w);

    if(insideX && (hitTop || hitBottom)){
      end();
    }

    if(p.x+p.w<0) pipes.splice(i,1);
  }

  if(bird.y>H||bird.y<0) end();
}

// ===== CONTROLS =====
startBtn.onclick=start;

soundBtn.onclick=()=>{
  soundOn=!soundOn;
  soundBtn.innerText = soundOn ? "🔊 Sound" : "🔇 Muted";
};

window.addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();flap();}
});
canvas.addEventListener("click",flap);
canvas.addEventListener("touchstart",flap);

</script>
</body>
</html>
